name: CI/CD Pipeline

on:
  pull_request:
    branches: [ "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t meu-projeto-app .

    - name: Run Docker Container
      run: docker run -d -p 8080:8080 --name meu-projeto-app-container meu-projeto-app